<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photo Grid (3 default, min 2)</title>
  <style>
    body {
      margin:0;
      background:#111;
      color:#eee;
      font-family:system-ui,Arial,sans-serif;
    }
    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr); /* default = 3 across */
      gap:16px;
      padding:20px;
      max-width:none;
      margin:0 auto;
    }
    /* Enforce minimum 2 columns on narrow screens */
    @media (max-width:800px){
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    img {
      width:100%;
      height:auto;               /* preserve portrait vs landscape */
      display:block;
      border-radius:12px;
      background:#222;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .4s ease, transform .4s ease;
    }
    img.loaded { opacity:1; transform:translateY(0) }
  </style>
</head>
<body>
  <main class="grid" id="grid"></main>

  <script>
    const grid = document.getElementById('grid');
    const MAX = 100;        // how many to try
    const ext = 'png';      // change if needed

    for (let i = 1; i <= MAX; i++) {
      const img = document.createElement('img');
      img.alt = `Photo ${i}`;
      img.loading = 'lazy';
      img.src = `./collection/${i}.${ext}`;

      let test = 0;

      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => {
        if (test == 0) {
          img.alt = `Photo ${i}`;
          img.loading = 'lazy';
          img.src = `./collection/${i}.jpg`;
          console.log(`./collection/${i}.jpg`)
          test = 1;
        } else {
          img.remove()
        }
      };

      grid.appendChild(img);
    }
  </script>
</body>
</html>
