<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Photography collection of the great Marius">
  <title>Marius' Photography</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:image" content="https://mariusphotos.com/preview-image.png">
  <meta property="og:title" content="Marius' Photography">
  <meta property="og:description" content="Photography collection of the great Marius">
  <meta property="og:url" content="https://mariusphotos.com/">
  <meta property="og:type" content="website">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Marius' Photography">
  <meta name="twitter:description" content="Photography collection of the great Marius">
  <meta name="twitter:image" content="https://mariusphotos.com/preview-image.png"> 

  <link rel="canonical" href="https://mariusphotos.com/">

  <style>
    body {
      margin:0;
      background:#111;
      color:#eee;
      font-family:system-ui,Arial,sans-serif;
    }
    
    .container {
      width: 75%; /* 1/8 margin on each side = 75% content area */
      margin: 0 auto;
      padding: 20px 0;
    }
    
    .title {
      font-family: 'Georgia', serif;
      font-size: 3.5em;
      font-weight: 300;
      text-align: center;
      margin: 40px 0 50px 0;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr); 
      gap:16px;
      padding:20px;
      max-width:none;
      margin:0 auto;
    }

    .grid img {
      width:100%;
      height:auto;
      display:block;
      border-radius:12px;
      background:#222;
      opacity:1;
      transform:translateY(8px);
      transition:opacity .4s ease, transform .4s ease;
    }
    img.loaded { opacity:1; transform:translateY(0) }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 80px;
      left: 0; top: 0;
      width: 100%; height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.9);
      align-items:center;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
    }

    .grid-caption {
      margin-top: 6px;
      text-align: center;
      font-family: "Times New Roman", Times, serif;
      font-size: 1rem;
      font-weight: 100;
      letter-spacing: 0.4px;
      color: #ddd;
      opacity: 0.85;
    }

    #modalImage {
      display: block;
      max-width: 80vw; 
      max-height: 80vh; 
      width: auto;  
      height: auto;
      object-fit: contain; 
      border-radius: 12px;
      background: transparent;
      align-items:center;
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 80%;
    }
    
    .close {
      position: absolute;
      top: 20px;
      right: 45px;
      color: #fff;
      font-size: 40px;
      cursor: pointer;
    }

    .prev,
    .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      padding: 16px;
      margin-top: -50px;
      color: white;
      font-weight: bold;
      font-size: 20px;
      transition: 0.6s ease;
      border-radius: 0 3px 3px 0;
      user-select: none;
      -webkit-user-select: none;
    }
    
    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }
    
    @media (max-width: 768px) {

      .container {
        width: 100%;
      }

      .title {
        font-size: 2em;
        letter-spacing: 3px;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 10px;
      }

      .grid-caption {
        font-size: 0.75rem;
        letter-spacing: 0.25px;
        opacity: 0.65;
        margin-top: 4px;
      }

      #modalImage {
        max-width: 92vw;
        max-height: 70vh;
      }

      .caption-container {
        top: 90%;
      }

      #caption {
        font-size: 1.4rem;
        letter-spacing: 0.3px;
      }

      .prev,
      .next {
        font-size: 16px;
        padding: 10px;
      }

      .close {
        font-size: 32px;
        top: 15px;
        right: 20px;
      }

      .caption-container {
        top: 90%;
        padding: 0 16px;
      }

      #caption {
        font-size: 1.3rem;       /* smaller on mobile */
        letter-spacing: 0.3px;
        line-height: 1.15;
      }
    }

    .caption-container {
      position: fixed;
      top: 83%;
      left: 0;
      width: 100vw;              /* full screen width */
      pointer-events: none;
      text-align: center;
      padding: 0 24px;
      box-sizing: border-box;
    }

    #caption {
      font-family: "Times New Roman", Times, serif;
      font-size: 2rem;
      font-weight: 100;
      letter-spacing: 0.5px;
      color: #ffffff;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.85);
      margin: 0;

      white-space: normal;       /* ALLOW wrapping */
      line-height: 1.2;          /* tighter multi-line spacing */
      max-width: 100%;
    }
      
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Marius' Photography</h1>
    
    <main class="grid" id="grid">

    <div id="myModal" class="modal">
      <span class="close">&times;</span>
      <img class="modal-content" id="modalImage">
      <div class="caption-container">
        <p id="caption"></p>
      </div>

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    </main>
  </div>

  <script>
  const modal = document.getElementById("myModal");
  const modalImg = document.getElementById("modalImage");
  const captionText = document.getElementById("caption");
  const closeBtn = document.querySelector(".close");
  const grid = document.getElementById('grid');

  const MAX = 95;
  const START = 10;
  const gen = 106;
  const ext = 'avif';

  let currentPlace = START;
  let locations = [];

  closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
  });

  function openModal(img) {
    modal.style.display = "block";
    modalImg.src = img.src;

    const match = img.src.match(/Image(\d+)_/);
    currentPlace = parseInt(match[1], 10);
    captionText.textContent = img.alt;
  }

  function plusSlides(n) {
    currentPlace += n;
    currentPlace = Math.max(START, Math.min(MAX, currentPlace));
    modalImg.src = `./collection/Image${currentPlace}_${gen}.${ext}`;
    captionText.textContent =
      locations[currentPlace - START];
  }

  // 🔹 Load locations.txt
  fetch('./locations.txt')
    .then(res => res.text())
    .then(text => {
      locations = text.split('.').map(s => s.trim());
      createImages();
    })
    .catch(err => {
      console.error('Failed to load locations.txt', err);
      createImages(); // fallback
    });

  function createImages() {
  for (let i = START; i <= MAX; i++) {
    const location = locations[i - START];

    const wrapper = document.createElement('div');
    wrapper.className = 'grid-item';

    const img = document.createElement('img');
    img.alt = location;
    img.loading = 'lazy';
    img.src = `./collection/Image${i}_${gen}.${ext}`;
    img.onclick = () => openModal(img);

    img.onload = () => img.classList.add('loaded');
    img.onerror = () => wrapper.remove();

    const caption = document.createElement('div');
    caption.className = 'grid-caption';
    caption.textContent = location;

    wrapper.appendChild(img);
    wrapper.appendChild(caption);
    grid.appendChild(wrapper);
  }
}
</script>
</body>
</html>
